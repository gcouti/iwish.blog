<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Projeto no GitHub Pages</title>
    <style>
        :root {
            --primary-color: #2f3640;
            --accent-color: #0097e6;
            --bg-color: #f5f6fa;
            --text-color: #2f3640;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        p {
            margin-bottom: 1.5rem;
        }

        .btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background-color: #00a8ff;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Olá, Mundo! 🚀</h1>
        <p>Este é o meu site hospedado gratuitamente no <strong>GitHub Pages</strong>.</p>
        
        <a href="https://github.com/seu-usuario" class="btn" target="_blank">Ver meu perfil no GitHub</a>

        <footer>
            Feito com ❤️ por [Seu Nome]
        </footer>
    </div>

</body>
</html>
